services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.12.0
    platform: linux/amd64
    container_name: startup-radar-mlflow
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts
      - --allowed-hosts
      - mlflow,mlflow:5000,localhost,localhost:5000,localhost:5001,127.0.0.1,127.0.0.1:5000,127.0.0.1:5001
      - --cors-allowed-origins
      - "*"
    ports:
      - "5001:5000"
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health',timeout=3).status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 12

  neo4j:
    image: neo4j:5.26-community
    container_name: startup-radar-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/startup-radar
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: startup-radar-backend
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: startup-radar
      FRONTEND_ORIGIN: http://localhost:5173
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_PUBLIC_URL: http://localhost:5001
      MLFLOW_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      mlflow:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: startup-radar-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mlflow-data:
  neo4j-data:
  neo4j-logs:
